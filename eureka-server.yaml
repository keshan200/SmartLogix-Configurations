server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://vm-node-a.platform:8888/eureka,
        http://vm-node-b.platform:8888/eureka,
        http://vm-node-c.platform:8888/eureka
  instance:
    hostname: ${HOSTNAME}
    prefer-ip-address: true