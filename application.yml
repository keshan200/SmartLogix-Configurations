spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/keshan200/SmartLogix-Configurations.git
          search-paths: platform,services
        native:
          search-locations:
            - classpath:/configurations
            - classpath:/configurations/platform
            - classpath:/configurations/services
eureka:
  client:
    service-url:
      defaultZone: http://vm-node-a.platform:8761/eureka ,http://vm-node-b.platform:8761/eureka,http://vm-node-c.platform:8761/eureka

server:
  port: 8888