server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/users/**
            - id: tracking-service
              uri: lb://TRACKING-SERVICE
              predicates:
                - Path=/api/jobs/**
            - id: document-service
              uri: lb://DOCUMENT-SERVICE
              predicates:
                - Path=/api/files/**
          default-filters:
            - PreserveHostHeader
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowed-methods: "*"
                allowed-headers: "*"

